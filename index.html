<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Orbit</title>
<meta name="description" content="Assignments, tasks and grades. An offline-first tracker for students.">
<meta name="theme-color" content="#0e1424">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Orbit">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-192.png">
<style>
/* ---------- tokens ---------- */
:root{
  --r-lg:18px; --r-md:12px; --r-sm:9px;
  --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
:root[data-theme="dark"]{
  --bg:#0e1424; --panel:#151c30; --panel2:#1c2542; --ink:#e9eef8; --haze:#94a1ba;
  --line:#273250; --ice:#8ab6ff; --ice-ink:#0c1630;
  --late:#ff7f8a; --warn:#f2b45c; --ok:#5fd6a0; --dband:#f09761;
  --glow:rgba(138,182,255,.10); --shade:rgba(4,8,20,.62);
}
:root[data-theme="light"]{
  --bg:#eef1f7; --panel:#ffffff; --panel2:#e7ebf4; --ink:#141a29; --haze:#5d6a83;
  --line:#d9dfec; --ice:#2f5fe0; --ice-ink:#ffffff;
  --late:#c93844; --warn:#96690b; --ok:#177a52; --dband:#ad5d17;
  --glow:rgba(47,95,224,.08); --shade:rgba(20,26,41,.38);
}
/* ---------- base ---------- */
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:var(--sans); color:var(--ink); background:var(--bg);
  background-image:radial-gradient(900px 480px at 78% -8%, var(--glow), transparent 62%);
  background-attachment:fixed;
  min-height:100vh; line-height:1.45;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  padding-bottom:calc(28px + env(safe-area-inset-bottom));
}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}
input,select,textarea{font:inherit;color:var(--ink)}
h1,h2,h3{margin:0;font-weight:700;letter-spacing:-.02em}
.num{font-family:var(--mono);font-variant-numeric:tabular-nums}
::selection{background:var(--ice);color:var(--ice-ink)}
:focus-visible{outline:2px solid var(--ice);outline-offset:2px;border-radius:6px}
@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}

/* ---------- header ---------- */
header.top{
  position:sticky;top:0;z-index:30;
  padding:calc(10px + env(safe-area-inset-top)) 16px 10px;
  background:color-mix(in srgb, var(--bg) 78%, transparent);
  -webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line);
}
.top-row{display:flex;align-items:center;gap:12px;max-width:760px;margin:0 auto}
.brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:19px;letter-spacing:-.02em}
.brand svg{display:block}
.hud{margin-left:2px;flex:1;min-width:0;font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--haze);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hud .late{color:var(--late)}
.icon-btn{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;color:var(--haze);border:1px solid transparent;flex:none}
.icon-btn:hover{background:var(--panel2);color:var(--ink)}
.tabs{display:flex;gap:4px;max-width:760px;margin:10px auto 0;background:var(--panel2);border:1px solid var(--line);border-radius:var(--r-md);padding:3px}
.tab{flex:1;padding:8px 6px;border-radius:9px;font-size:13.5px;font-weight:600;color:var(--haze);display:flex;justify-content:center;align-items:center;gap:6px;transition:background .16s ease,color .16s ease}
.tab.active{background:var(--panel);color:var(--ink);box-shadow:0 1px 6px rgba(0,0,0,.14)}
.badge{min-width:17px;height:17px;padding:0 5px;border-radius:9px;background:var(--late);color:#fff;font-family:var(--mono);font-size:10.5px;font-weight:700;display:inline-grid;place-items:center}

/* ---------- layout ---------- */
main{max-width:760px;margin:0 auto;padding:18px 16px 8px}
.panel-head{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin:6px 0 14px}
.eyebrow{font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--haze);margin-bottom:4px}
.panel-head h2{font-size:22px}
.sub{margin:2px 0 0;color:var(--haze);font-size:13px}
.stack{display:flex;flex-direction:column;gap:10px}
.divider-label{font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--haze);margin:16px 2px 2px}

/* ---------- buttons ---------- */
.btn{display:inline-flex;align-items:center;gap:7px;border-radius:var(--r-md);padding:9px 15px;font-weight:650;font-size:14px;border:1px solid var(--line);background:var(--panel);transition:filter .16s ease,background .16s ease}
.btn:hover{filter:brightness(1.06)}
.btn.primary{background:var(--ice);color:var(--ice-ink);border-color:transparent}
.btn.ghost{background:transparent;color:var(--haze)}
.btn.ghost:hover{color:var(--ink);background:var(--panel2)}
.btn.sm{padding:7px 11px;font-size:13px;border-radius:10px}
.btn.danger-ghost{color:var(--late)}

/* ---------- cards ---------- */
.card{
  position:relative;background:var(--panel);border:1px solid var(--line);
  border-radius:var(--r-lg);padding:13px 14px 13px 18px;
  animation:rise .22s ease both;
}
@keyframes rise{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.card::before{ /* status rail: the urgency signal */
  content:"";position:absolute;left:7px;top:13px;bottom:13px;width:3px;border-radius:3px;
  background:var(--line);
}
.card.s-late::before{background:var(--late)}
.card.s-today::before{background:var(--warn)}
.card.s-soon::before{background:var(--ice)}
.card.done{opacity:.55}
.card.done::before{background:var(--line)}
.item{display:flex;gap:11px;align-items:flex-start}
.item-main{flex:1;min-width:0}
.title-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.title-row h3{font-size:15.5px;font-weight:650;letter-spacing:-.01em}
.done .title-row h3{text-decoration:line-through;text-decoration-thickness:1.5px}
.meta{margin-top:4px;color:var(--haze);font-size:12.5px;display:flex;flex-wrap:wrap;gap:4px 10px}
.meta b{color:var(--ink);font-weight:600}
.details{margin:7px 0 0;color:var(--haze);font-size:13px;white-space:pre-wrap;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;cursor:pointer}
.details.open{-webkit-line-clamp:unset}
.item-side{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex:none}
.row-actions{display:flex;gap:2px;opacity:.85}
.row-actions .icon-btn{width:30px;height:30px;border-radius:8px}

/* chips */
.chip{display:inline-flex;align-items:center;gap:5px;padding:2.5px 8px;border-radius:999px;font-size:11px;font-weight:650;letter-spacing:.01em;background:var(--panel2);color:var(--haze);border:1px solid var(--line)}
.chip.tint-ice{background:color-mix(in srgb,var(--ice) 16%,transparent);color:var(--ice);border-color:color-mix(in srgb,var(--ice) 34%,transparent)}
.chip.tint-late{background:color-mix(in srgb,var(--late) 15%,transparent);color:var(--late);border-color:color-mix(in srgb,var(--late) 32%,transparent)}
.chip.tint-warn{background:color-mix(in srgb,var(--warn) 16%,transparent);color:var(--warn);border-color:color-mix(in srgb,var(--warn) 34%,transparent)}
.chip.tint-ok{background:color-mix(in srgb,var(--ok) 14%,transparent);color:var(--ok);border-color:color-mix(in srgb,var(--ok) 32%,transparent)}
.chip.tint-d{background:color-mix(in srgb,var(--dband) 16%,transparent);color:var(--dband);border-color:color-mix(in srgb,var(--dband) 34%,transparent)}
.due-chip{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.02em}

/* checkbox */
.tick{flex:none;padding-top:1px}
.tick input{appearance:none;-webkit-appearance:none;width:21px;height:21px;margin:0;border-radius:7px;border:1.5px solid var(--line);background:var(--panel2);display:grid;place-items:center;cursor:pointer;transition:background .15s ease,border-color .15s ease}
.tick input:checked{background:var(--ice);border-color:var(--ice)}
.tick input:checked::after{content:"";width:11px;height:11px;background:var(--ice-ink);
  -webkit-mask:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>') center/contain no-repeat;
  mask:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>') center/contain no-repeat}

/* ---------- quick tasks ---------- */
.quick-add{display:flex;gap:8px;margin-bottom:12px}
.quick-add input{flex:1}
.mode-toggle{display:flex;gap:4px;background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:3px;margin-bottom:14px}
.mode-toggle button{flex:1;padding:7px;border-radius:8px;font-size:13px;font-weight:600;color:var(--haze)}
.mode-toggle button.active{background:var(--panel);color:var(--ink);box-shadow:0 1px 5px rgba(0,0,0,.12)}
.quick-row{padding:11px 14px 11px 16px}
.quick-row .item{align-items:center}
.quick-row h3{font-size:14.5px;font-weight:550}

/* ---------- forms ---------- */
input[type=text],input[type=number],input[type=date],select,textarea{
  width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:var(--r-sm);
  padding:9px 11px;font-size:14px;transition:border-color .15s ease;
}
input:focus,select:focus,textarea:focus{border-color:var(--ice);outline:none}
textarea{resize:vertical;min-height:66px}
select{appearance:none;-webkit-appearance:none;background-image:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="6" viewBox="0 0 10 6" fill="none"><path d="M1 1l4 4 4-4" stroke="%23808ba3" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>');background-repeat:no-repeat;background-position:right 11px center;padding-right:28px}
label.f{display:block;font-size:12px;font-weight:650;color:var(--haze);margin:0 0 5px;letter-spacing:.02em}
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.f-block{margin-bottom:13px}
input[type=date]{min-height:38px;-webkit-appearance:none}

/* ---------- modal ---------- */
.backdrop{position:fixed;inset:0;z-index:50;background:var(--shade);-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center;animation:fade .18s ease both}
@keyframes fade{from{opacity:0}to{opacity:1}}
.sheet{width:100%;max-width:560px;max-height:88vh;overflow:auto;background:var(--panel);border:1px solid var(--line);border-radius:22px 22px 0 0;padding:20px 20px calc(20px + env(safe-area-inset-bottom));animation:slide .22s ease both}
@keyframes slide{from{transform:translateY(24px);opacity:.6}to{transform:none;opacity:1}}
@media(min-width:640px){.backdrop{align-items:center;padding:24px}.sheet{border-radius:22px}}
.sheet h3{font-size:17px;margin-bottom:16px}
.sheet-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:6px}
.data-actions{display:flex;flex-direction:column;gap:8px}
.data-actions .btn{justify-content:flex-start}
.hint{font-size:12.5px;color:var(--haze);margin:12px 0 0;line-height:1.5}

/* ---------- grades ---------- */
.subject{padding:15px 16px 14px 18px}
.subject::before{background:var(--ice)}
.subject-head{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.subject-title{flex:1;background:transparent;border:1px solid transparent;border-radius:8px;padding:5px 8px;font-size:16.5px;font-weight:700;letter-spacing:-.01em}
.subject-title:hover{border-color:var(--line)}
.subject-title:focus{background:var(--panel2);border-color:var(--ice)}
.gtable{display:grid;grid-template-columns:minmax(0,1fr) 44px 60px 60px 52px 26px;gap:7px 8px;align-items:center;margin-bottom:9px}
.g-h{font-family:var(--mono);font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--haze)}
.g-h.r,.g-cell.r{text-align:right}
.g-cell{font-size:13px;color:var(--haze)}
.g-cell.pct{color:var(--ink);font-weight:650}
.gtable select,.gtable input{padding:7px 9px;font-size:13px;border-radius:8px;min-width:0}
.gtable select{padding-right:24px;background-position:right 8px center}
.gtable input[type=number]{text-align:right;font-family:var(--mono)}
.g-x{width:26px;height:26px;border-radius:7px;color:var(--haze);display:grid;place-items:center}
.g-x:hover{color:var(--late);background:var(--panel2)}
.subject-foot{display:flex;align-items:center;gap:14px;border-top:1px solid var(--line);margin-top:12px;padding-top:13px}
.gauge{flex:none;position:relative;width:58px;height:58px}
.gauge svg{display:block;transform:rotate(-90deg)}
.gauge .track{stroke:var(--panel2)}
.gauge .val{transition:stroke-dashoffset .4s ease}
.gauge .g-num{position:absolute;inset:0;display:grid;place-items:center;font-family:var(--mono);font-size:12.5px;font-weight:700}
.foot-text{flex:1;min-width:0}
.foot-text .big{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.foot-text .sub{font-size:12px}
.empty{border:1.5px dashed var(--line);border-radius:var(--r-lg);padding:30px 20px;text-align:center;color:var(--haze);font-size:14px}
.empty b{color:var(--ink)}

@media(max-width:430px){
  .hud{display:none}
  .gtable{grid-template-columns:minmax(0,1fr) 36px 52px 52px 46px 24px;gap:6px}
  .gtable select,.gtable input{font-size:12px;padding:6px 7px}
  .gtable select{padding-right:20px}
  .g-cell{font-size:12px}
  .f-row{grid-template-columns:1fr}
}
</style>
</head>
<body>

<header class="top">
  <div class="top-row">
    <div class="brand">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <circle cx="12" cy="12" r="9" stroke="var(--ice)" stroke-width="2"/>
        <circle cx="12" cy="12" r="3.4" fill="var(--ice)"/>
        <circle cx="18.4" cy="5.6" r="2.1" fill="var(--bg)"/>
        <circle cx="18.4" cy="5.6" r="1.4" fill="var(--ice)"/>
      </svg>
      Orbit
    </div>
    <div class="hud" id="hud"></div>
    <button class="icon-btn" id="theme-btn" title="Switch theme" aria-label="Switch theme"></button>
    <button class="icon-btn" data-action="data-menu" title="Backup and data" aria-label="Backup and data">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><ellipse cx="12" cy="5.5" rx="8" ry="3"/><path d="M4 5.5v6c0 1.66 3.58 3 8 3s8-1.34 8-3v-6"/><path d="M4 11.5v6c0 1.66 3.58 3 8 3s8-1.34 8-3v-6"/></svg>
    </button>
  </div>
  <nav class="tabs" role="tablist" aria-label="Sections">
    <button class="tab" role="tab" data-action="tab" data-tab="assignments">Assignments <span class="badge" id="overdue-badge" style="display:none"></span></button>
    <button class="tab" role="tab" data-action="tab" data-tab="tasks">Tasks</button>
    <button class="tab" role="tab" data-action="tab" data-tab="grades">Grades</button>
  </nav>
</header>

<main id="view"></main>
<div id="modal-root"></div>
<input type="file" id="import-file" accept="application/json,.json" hidden>

<script>
(function(){
'use strict';

/* ================= storage ================= */
var KEY='orbit.v1';
var memStore=null;
function readRaw(){ try{ return localStorage.getItem(KEY); }catch(e){ return memStore; } }
function writeRaw(v){ try{ localStorage.setItem(KEY,v); }catch(e){ memStore=v; } }

function blank(){ return {assignments:[],quick:[],tasks:[],subjects:[],theme:null,ui:{tab:'assignments',taskMode:'quick'}}; }
function load(){
  try{
    var raw=readRaw(); if(!raw) return blank();
    var p=JSON.parse(raw), b=blank();
    for(var k in b){ if(p[k]===undefined) p[k]=b[k]; }
    if(!p.ui) p.ui=b.ui;
    return p;
  }catch(e){ return blank(); }
}
var S=load();
function save(){ writeRaw(JSON.stringify(S)); }

/* ================= utils ================= */
function uid(){ try{ return crypto.randomUUID(); }catch(e){ return 'id-'+Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,9); } }
function $(s){ return document.querySelector(s); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
function todayMid(){ var d=new Date(); d.setHours(0,0,0,0); return d; }
function parseD(s){ if(!s) return null; var p=s.split('-'); return new Date(+p[0],+p[1]-1,+p[2]); }
function fmtD(s){ var d=parseD(s); return d? d.toLocaleDateString(undefined,{weekday:'short',day:'numeric',month:'short'}) : ''; }
function todayStr(){ var d=new Date(); function p(n){return String(n).padStart(2,'0');} return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate()); }

/* diff = days from today until due (negative = past) */
function dueDiff(item){ if(!item.dueDate) return null; return Math.round((parseD(item.dueDate)-todayMid())/864e5); }
function isOverdue(item){ var d=dueDiff(item); return d!==null && d<0 && !item.completed; }
function overdueDays(item){ var d=dueDiff(item); return d===null? 0 : Math.abs(Math.min(d,0)); }

function statusClass(item){
  if(item.completed) return 'done';
  var d=dueDiff(item);
  if(d===null) return '';
  if(d<0) return 's-late';
  if(d===0) return 's-today';
  if(d<=7) return 's-soon';
  return '';
}
function dueChip(item){
  if(item.completed) return '<span class="chip tint-ok due-chip">Done</span>';
  var d=dueDiff(item);
  if(d===null) return '';
  if(d<0) return '<span class="chip tint-late due-chip">Overdue '+Math.abs(d)+'d</span>';
  if(d===0) return '<span class="chip tint-warn due-chip">Due today</span>';
  if(d===1) return '<span class="chip tint-ice due-chip">Due tomorrow</span>';
  if(d<=14) return '<span class="chip tint-ice due-chip">Due in '+d+'d</span>';
  return '<span class="chip due-chip">'+esc(fmtD(item.dueDate))+'</span>';
}
function prioChip(p){
  if(p==='High') return '<span class="chip tint-late">High</span>';
  if(p==='Medium') return '<span class="chip tint-warn">Medium</span>';
  return '<span class="chip tint-ok">Low</span>';
}
function sortByDue(list){
  var BIG=8.64e15;
  return list.slice().sort(function(a,b){
    if(!!a.completed!==!!b.completed) return a.completed?1:-1;
    var da=a.dueDate?parseD(a.dueDate).getTime():BIG;
    var db=b.dueDate?parseD(b.dueDate).getTime():BIG;
    if(da!==db) return da-db;
    return String(a.name).localeCompare(String(b.name));
  });
}
function classList(){
  var s={};
  S.assignments.concat(S.tasks).forEach(function(x){ if(x.klass) s[x.klass]=1; });
  return Object.keys(s).sort();
}

/* ================= grades maths ================= */
function letterFor(p){
  if(p>=85) return 'A';
  if(p>=70) return 'B';
  if(p>=55) return 'C';
  if(p>=50) return 'D';
  return 'Fail';
}
function letterTint(L){ return L==='A'?'tint-ok':L==='B'?'tint-ice':L==='C'?'tint-warn':L==='D'?'tint-d':'tint-late'; }
function rowPct(r){
  if(r.mark===null||r.mark===undefined||r.mark==='') return null;
  var t=Number(r.total), m=Number(r.mark);
  if(!isFinite(t)||t<=0||!isFinite(m)) return null;
  return (m/t)*100;
}
function rowWeight(r){
  var a=S.assignments.find(function(x){return x.id===r.assignmentId;});
  if(!a) return null;
  var w=Number(a.weighting);
  return isFinite(w)&&w>0? w : null;
}
function subjectFinal(sub){
  var sw=0, swp=0;
  sub.rows.forEach(function(r){
    var w=rowWeight(r), p=rowPct(r);
    if(w!==null&&p!==null){ sw+=w; swp+=w*p; }
  });
  return sw>0? {final:swp/sw, sumW:sw} : null;
}

/* ================= theme ================= */
function systemLight(){ try{ return window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches; }catch(e){ return false; } }
var ICON={
  sun:'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4.4"/><path d="M12 2.5v2.4M12 19.1v2.4M2.5 12h2.4M19.1 12h2.4M4.9 4.9l1.7 1.7M17.4 17.4l1.7 1.7M19.1 4.9l-1.7 1.7M6.6 17.4l-1.7 1.7"/></svg>',

function resolvedTheme(){ return S.theme || (systemLight()?'light':'dark'); }
function applyTheme(){
  var t=resolvedTheme();
  document.documentElement.dataset.theme=t;
  var m=document.querySelector('meta[name=theme-color]');
  if(m) m.content = t==='light' ? '#eef1f7' : '#0e1424';
  var b=$('#theme-btn'); if(b) b.innerHTML = t==='light' ? ICON.moon : ICON.sun;
}

/* ================= views ================= */
function assignmentCard(a){
  var meta=[];
  if(a.klass) meta.push('<span><b>'+esc(a.klass)+'</b></span>');
  meta.push('<span>'+esc(a.assessType||'')+'</span>');
  if(a.weighting!==null&&a.weighting!==undefined&&a.weighting!=='') meta.push('<span class="num">'+esc(a.weighting)+'% weighting</span>');
  if(a.dateAssigned) meta.push('<span>Assigned '+esc(fmtD(a.dateAssigned))+'</span>');
  if(a.dueDate) meta.push('<span>Due '+esc(fmtD(a.dueDate))+'</span>');
  return '<article class="card '+statusClass(a)+'">'+
    '<div class="item">'+
      '<label class="tick"><input type="checkbox" data-action="toggle-assignment" data-id="'+a.id+'"'+(a.completed?' checked':'')+' aria-label="Mark complete"></label>'+
      '<div class="item-main">'+
        '<div class="title-row"><h3>'+esc(a.name)+'</h3>'+prioChip(a.priority)+'</div>'+
        '<div class="meta">'+meta.join('')+'</div>'+
        (a.details? '<p class="details" data-action="expand">'+esc(a.details)+'</p>':'')+
      '</div>'+
      '<div class="item-side">'+dueChip(a)+
        '<div class="row-actions">'+
          '<button class="icon-btn" data-action="edit-assignment" data-id="'+a.id+'" title="Edit" aria-label="Edit">'+ICON.edit+'</button>'+
          '<button class="icon-btn" data-action="del-assignment" data-id="'+a.id+'" title="Delete" aria-label="Delete">'+ICON.trash+'</button>'+
        '</div>'+
      '</div>'+
    '</div>'+
  '</article>';
}

function viewAssignments(){
  var open=S.assignments.filter(function(a){return !a.completed;}).length;
  var late=S.assignments.filter(isOverdue).length;
  var h='<div class="panel-head"><div><div class="eyebrow">Assessment tracker</div><h2>Assignments</h2>'+
    '<p class="sub">'+open+' open'+(late? ' &middot; <b style="color:var(--late)">'+late+' overdue</b>':'')+'</p></div>'+
    '<button class="btn primary" data-action="new-assignment">'+ICON.plus+' New</button></div>';
  if(!S.assignments.length){
    h+='<div class="empty"><b>No assignments yet.</b><br>Add your first assessment and Orbit will track its due date, weighting and overdue status.</div>';
  }else{
    h+='<div class="stack">'+sortByDue(S.assignments).map(assignmentCard).join('')+'</div>';
  }
  return h;
}

function assignmentOptions(selected){
  var opts='<option value="">Select assessment</option>';
  sortByDue(S.assignments).forEach(function(a){
    var w=(a.weighting!==null&&a.weighting!==undefined&&a.weighting!=='')? a.weighting+'%' : 'no weighting';
    opts+='<option value="'+a.id+'"'+(a.id===selected?' selected':'')+'>'+esc(a.name)+' ('+esc(a.klass||'no class')+', '+esc(w)+')</option>';
  });
  return opts;
}

function gaugeHTML(final){
  var C=2*Math.PI*24;
  var off=C*(1-Math.max(0,Math.min(100,final))/100);
  var L=letterFor(final);
  var col=L==='A'?'var(--ok)':L==='B'?'var(--ice)':L==='C'?'var(--warn)':L==='D'?'var(--dband)':'var(--late)';
  return '<div class="gauge" aria-hidden="true"><svg width="58" height="58" viewBox="0 0 58 58">'+
    '<circle class="track" cx="29" cy="29" r="24" fill="none" stroke-width="6"/>'+
    '<circle class="val" cx="29" cy="29" r="24" fill="none" stroke="'+col+'" stroke-width="6" stroke-linecap="round" stroke-dasharray="'+C.toFixed(2)+'" stroke-dashoffset="'+off.toFixed(2)+'"/>'+
    '</svg><div class="g-num">'+Math.round(final)+'</div></div>';
}

function footHTML(sub){
  var f=subjectFinal(sub);
  if(!f) return '<div class="foot-text"><div class="big">Weighted grade</div><p class="sub">Pick assessments and enter marks to calculate.</p></div>';
  var L=letterFor(f.final);
  return gaugeHTML(f.final)+
    '<div class="foot-text"><div class="big"><span class="num">'+f.final.toFixed(1)+'%</span>'+
    '<span class="chip '+letterTint(L)+'">'+L+'</span></div>'+
    '<p class="sub">Weighted across <span class="num">'+f.sumW+'%</span> of assessment weighting entered.</p></div>';
}

function subjectCard(sub){
  var rows=sub.rows.map(function(r){
    var w=rowWeight(r), p=rowPct(r);
    return '<select data-role="g-select" data-sub="'+sub.id+'" data-row="'+r.id+'" aria-label="Assessment">'+assignmentOptions(r.assignmentId)+'</select>'+
      '<div class="g-cell r num" data-cell="w-'+r.id+'">'+(w===null?'-':w)+'</div>'+
      '<input type="number" inputmode="decimal" step="any" min="0" data-role="g-in" data-field="mark" data-sub="'+sub.id+'" data-row="'+r.id+'" value="'+(r.mark===null||r.mark===undefined?'':r.mark)+'" placeholder="0" aria-label="Mark">'+
      '<input type="number" inputmode="decimal" step="any" min="0" data-role="g-in" data-field="total" data-sub="'+sub.id+'" data-row="'+r.id+'" value="'+(r.total===null||r.total===undefined?'':r.total)+'" placeholder="0" aria-label="Total mark">'+
      '<div class="g-cell pct r num" data-cell="p-'+r.id+'">'+(p===null?'-':p.toFixed(1))+'</div>'+
      '<button class="g-x" data-action="del-row" data-sub="'+sub.id+'" data-row="'+r.id+'" title="Remove row" aria-label="Remove row">'+ICON.x+'</button>';
  }).join('');
  return '<section class="card subject">'+
    '<div class="subject-head">'+
      '<input class="subject-title" data-role="subject-title" data-sub="'+sub.id+'" value="'+esc(sub.name)+'" aria-label="Subject name (click to rename)" title="Click to rename">'+
      '<button class="icon-btn" data-action="del-subject" data-id="'+sub.id+'" title="Delete subject" aria-label="Delete subject">'+ICON.trash+'</button>'+
    '</div>'+
    (sub.rows.length?
      '<div class="gtable">'+
        '<div class="g-h">Assessment</div><div class="g-h r">W%</div><div class="g-h r">Mark</div><div class="g-h r">Out of</div><div class="g-h r">%</div><div></div>'+
        rows+
      '</div>' : '<p class="sub" style="margin:0 0 10px">No assessments in this table yet.</p>')+
    '<button class="btn ghost sm" data-action="add-row" data-id="'+sub.id+'">'+ICON.plus+' Add assessment</button>'+
    '<div class="subject-foot" data-foot="'+sub.id+'">'+footHTML(sub)+'</div>'+
  '</section>';
}

/* ================= render ================= */
function render(){
  document.querySelectorAll('.tab').forEach(function(b){ b.classList.toggle('active', b.dataset.tab===S.ui.tab); b.setAttribute('aria-selected', b.dataset.tab===S.ui.tab); });
  var late=S.assignments.filter(isOverdue).length;
  var badge=$('#overdue-badge');
  if(badge){ badge.textContent=late; badge.style.display=late?'':'none'; }
  var open=S.assignments.filter(function(a){return !a.completed;}).length;
  var hud=$('#hud');
  if(hud){
    var d=new Date().toLocaleDateString(undefined,{weekday:'short',day:'2-digit',month:'short'});
    hud.innerHTML=esc(d)+' &middot; '+open+' due'+(late? ' &middot; <span class="late">'+late+' late</span>':'');
  }
  var v=$('#view');
  v.innerHTML = S.ui.tab==='tasks'? viewTasks() : S.ui.tab==='grades'? viewGrades() : viewAssignments();
}

  $('#modal-root').innerHTML='<div class="backdrop"><div class="sheet" role="dialog" aria-modal="true">'+html+'</div></div>';
  setTimeout(function(){ var f=$('#modal-root .sheet').querySelector('input,select,textarea,button'); if(f) f.focus(); },40);
}

/* ================= mutations ================= */
function readForm(form){
  var fd=new FormData(form), o={};
  fd.forEach(function(v,k){ o[k]=typeof v==='string'? v.trim() : v; });
  o.weighting = o.weighting===''? null : Number(o.weighting);
  if(o.weighting!==null && !isFinite(o.weighting)) o.weighting=null;
  return o;
}
function upsertItem(o){
  var list = o.kind==='assignment'? S.assignments : S.tasks;
  var base={ name:o.name, klass:o.klass, priority:o.priority, dateAssigned:o.dateAssigned||null,
             dueDate:o.dueDate||null, weighting:o.weighting, details:o.details||'' };
  if(o.kind==='assignment') base.assessType=o.assessType; else base.taskType=o.taskType;
  if(o.id){
    var i=list.findIndex(function(x){return x.id===o.id;});
    if(i>-1){ base.id=o.id; base.completed=list[i].completed; list[i]=base; }
  }else{
    base.id=uid(); base.completed=false; list.push(base);
  }
  save(); render();
}
function exportData(){
  var blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='orbit-backup-'+todayStr()+'.json';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(function(){ URL.revokeObjectURL(a.href); },800);
}
function importData(file){
  var r=new FileReader();
  r.onload=function(){
    try{
      var p=JSON.parse(r.result);
      if(!p || typeof p!=='object') throw 0;
      var b=blank();
      for(var k in b){ if(p[k]===undefined) p[k]=b[k]; }
      if(!confirm('Replace everything in Orbit with this backup?')) return;
      S=p; save(); applyTheme(); closeModal(); render();
    }catch(e){ alert('That file is not a valid Orbit backup.'); }
  };
  r.readAsText(file);
}
function updateSubjectFoot(subId){
  var sub=S.subjects.find(function(s){return s.id===subId;});
  var el=document.querySelector('[data-foot="'+subId+'"]');
  if(sub&&el) el.innerHTML=footHTML(sub);
}

/* ================= events (delegated) ================= */
document.addEventListener('click',function(e){
  var t=e.target.closest('[data-action]');
  if(e.target.classList && e.target.classList.contains('backdrop')){ closeModal(); return; }
  if(!t) return;
  var act=t.dataset.action, id=t.dataset.id;
  switch(act){
    case 'tab': S.ui.tab=t.dataset.tab; save(); render(); break;
    case 'taskmode': S.ui.taskMode=t.dataset.mode; save(); render(); break;
    case 'close-modal': closeModal(); break;
    case 'data-menu': dataMenu(); break;
    case 'export': exportData(); break;
    case 'import-trigger': $('#import-file').click(); break;
    case 'reset':
      if(confirm('Erase every assignment, task and subject? This cannot be undone.')){ S=blank(); save(); closeModal(); applyTheme(); render(); }
      break;
    case 'new-assignment': openModal(itemForm('assignment')); break;
    case 'edit-assignment': openModal(itemForm('assignment', S.assignments.find(function(x){return x.id===id;}))); break;
    case 'del-assignment':
      if(confirm('Delete this assignment? Grade tables using it will show it as removed.')){
        S.assignments=S.assignments.filter(function(x){return x.id!==id;}); save(); render();
      } break;
    case 'new-task': openModal(itemForm('task')); break;
    case 'edit-task': openModal(itemForm('task', S.tasks.find(function(x){return x.id===id;}))); break;
    case 'del-task':
      if(confirm('Delete this task?')){ S.tasks=S.tasks.filter(function(x){return x.id!==id;}); save(); render(); } break;
    case 'quick-add': addQuickFromInput(); break;
    case 'quick-del': S.quick=S.quick.filter(function(q){return q.id!==id;}); save(); render(); break;
    case 'clear-done': S.quick=S.quick.filter(function(q){return !q.done;}); save(); render(); break;
    case 'add-subject':
      S.subjects.push({id:uid(),name:'New subject',rows:[]}); save(); render();
      var titles=document.querySelectorAll('.subject-title'); var last=titles[titles.length-1];
      if(last){ last.focus(); last.select(); }
      break;
    case 'del-subject':
      if(confirm('Delete this subject and its grade table?')){ S.subjects=S.subjects.filter(function(s){return s.id!==id;}); save(); render(); } break;
    case 'add-row':
      var sub=S.subjects.find(function(s){return s.id===id;});
      if(sub){ sub.rows.push({id:uid(),assignmentId:'',mark:null,total:null}); save(); render(); }
      break;
    case 'del-row':
      var s2=S.subjects.find(function(s){return s.id===t.dataset.sub;});
      if(s2){ s2.rows=s2.rows.filter(function(r){return r.id!==t.dataset.row;}); save(); render(); }
      break;
    case 'expand': t.classList.toggle('open'); break;
  }
});

document.addEventListener('change',function(e){
  var el=e.target;
  if(el.id==='import-file'){ if(el.files&&el.files[0]) importData(el.files[0]); el.value=''; return; }
  var act=el.dataset.action, role=el.dataset.role;
  if(act==='toggle-assignment'){
    var a=S.assignments.find(function(x){return x.id===el.dataset.id;});
    if(a){ a.completed=el.checked; save(); render(); }
  }else if(act==='toggle-task'){
    var t2=S.tasks.find(function(x){return x.id===el.dataset.id;});
    if(t2){ t2.completed=el.checked; save(); render(); }
  }else if(act==='quick-toggle'){
    var q=S.quick.find(function(x){return x.id===el.dataset.id;});
    if(q){ q.done=el.checked; save(); render(); }
  }else if(role==='g-select'){
    var sub=S.subjects.find(function(s){return s.id===el.dataset.sub;});
    if(!sub) return;
    var row=sub.rows.find(function(r){return r.id===el.dataset.row;});
    if(!row) return;
    row.assignmentId=el.value; save();
    var w=rowWeight(row);
    var wc=document.querySelector('[data-cell="w-'+row.id+'"]');
    if(wc) wc.textContent = w===null? '-' : w;
    updateSubjectFoot(sub.id);
  }else if(role==='subject-title'){
    var s3=S.subjects.find(function(s){return s.id===el.dataset.sub;});
    if(s3){ s3.name=el.value.trim()||'Untitled subject'; el.value=s3.name; save(); }
  }
});

document.addEventListener('input',function(e){
  var el=e.target;
  if(el.dataset.role!=='g-in') return;
  var sub=S.subjects.find(function(s){return s.id===el.dataset.sub;});
  if(!sub) return;
  var row=sub.rows.find(function(r){return r.id===el.dataset.row;});
  if(!row) return;
  row[el.dataset.field]= el.value===''? null : Number(el.value);
  save();
  var p=rowPct(row);
  var pc=document.querySelector('[data-cell="p-'+row.id+'"]');
  if(pc) pc.textContent = p===null? '-' : p.toFixed(1);
  updateSubjectFoot(sub.id);
});

document.addEventListener('submit',function(e){
  var f=e.target.closest('[data-form="item"]');
  if(!f) return;
  e.preventDefault();
  var o=readForm(f);
  if(!o.name) return;
  closeModal();
  upsertItem(o);
});

document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){ closeModal(); return; }
  if(e.key==='Enter' && e.target && e.target.id==='quick-input'){ e.preventDefault(); addQuickFromInput(); }
});

function addQuickFromInput(){
  var inp=$('#quick-input'); if(!inp) return;
  var name=inp.value.trim(); if(!name) return;
  S.quick.push({id:uid(),name:name,done:false});
  save(); render();
  var again=$('#quick-input'); if(again) again.focus();
}

$('#theme-btn').addEventListener('click',function(){
  S.theme = resolvedTheme()==='light' ? 'dark' : 'light';
  save(); applyTheme();
});

/* ================= boot ================= */
applyTheme();
render();

if('serviceWorker' in navigator && /^https?:$/.test(location.protocol)){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('sw.js').catch(function(){});
  });
}

/* small API surface for automated tests */
window.__orbit={
  get state(){ return S; },
  save:save, render:render, letterFor:letterFor, subjectFinal:subjectFinal,
  dueDiff:dueDiff, isOverdue:isOverdue, overdueDays:overdueDays,
  addAssignment:function(o){ var a=Object.assign({id:uid(),completed:false},o); S.assignments.push(a); save(); render(); return a.id; },
  addTask:function(o){ var t=Object.assign({id:uid(),completed:false},o); S.tasks.push(t); save(); render(); return t.id; },
  addQuick:function(n){ var q={id:uid(),name:n,done:false}; S.quick.push(q); save(); render(); return q.id; },
  addSubject:function(n){ var s={id:uid(),name:n,rows:[]}; S.subjects.push(s); save(); render(); return s.id; },
  addRow:function(sid,aid,mark,total){ var s=S.subjects.find(function(x){return x.id===sid;}); if(!s) return null; var r={id:uid(),assignmentId:aid,mark:mark,total:total}; s.rows.push(r); save(); render(); return r.id; }
};
})();
</script>
</body>
</html>
